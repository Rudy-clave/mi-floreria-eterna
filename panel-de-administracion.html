<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0 viewport-fit=cover">
<title>Flores ETernas Eli | Panel de  Administracion </title>

<link rel="stylesheet" href="css/panel-administracion.css">
<link rel="stylesheet" href="css/style.css?v=2.0">


<style>

body{
    margin:0;
    font-family:Poppins,sans-serif;
    background:#f7f0e8;
}

/* HEADER ELEGANTE */
header{
    background:#b8d1e0;
    color:white;
    padding:25px;
    text-align:center;
}

/* CONTENEDOR */
.container{
    padding:20px;
    max-width:1000px;
    margin:auto;
}

/* ESTADÍSTICAS */
.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    margin-top:20px;
}

.card{
    background:white;
    border-radius:15px;
    padding:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
    border-top:4px solid #d63384;
}

/* FORMULARIO */
input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:10px;
    border:1px solid #ddd;
}

/* BOTONES */
button{
    background:#d63384;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    opacity:.85;
}

.btn-eliminar{
    background:#e74c3c;
}

.btn-eliminar:hover{
    background:#c0392b;
}

/* LISTA PRODUCTOS */
.producto{
    background:white;
    padding:15px;
    margin-top:10px;
    border-radius:12px;
    box-shadow:0 3px 10px rgba(0,0,0,.06);
}

.topbar{
    display:flex;
    justify-content:space-between;
    margin-top:15px;
}

a{
    text-decoration:none;
    color:#8B4513;
}


.preview-box{
    margin-top:15px;
    text-align:center;
}

#preview{
    width:220px;
    height:220px;
    object-fit:cover;
    border-radius:15px;
    border:2px dashed #d63384;
    padding:5px;
}


/*=========================
    MODAL
=========================*/

.modal{

    display:none;

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,.55);

    justify-content:center;

    align-items:center;

    z-index:9999;

}

.modal-contenido{

    background:white;

    width:420px;

    max-width:90%;

    padding:30px;

    border-radius:20px;

    box-shadow:0 10px 40px rgba(0,0,0,.25);

}

.modal-contenido h2{

    margin-top:0;

    color:#8B4513;

    text-align:center;

}

.modal-botones{

    display:flex;

    justify-content:flex-end;

    gap:10px;

    margin-top:20px;

}

.cancelar{

    background:#777;

}

</style>


<link rel="icon" href="images/favicon.jpeg">


</head>

<body>

<header>

 <div class="header-content">

    <div class="brand">
      <div class="logo-box">
        <img src="images/Logo.jpeg" alt="Logo" class="logo">
      </div>
      <span class="brand-text">Mi Florería Eterna</span>
    </div>

    <a href="index.html" class="volver">🏠 Inicio</a>

  </div>

  <p class="subtitulo">Gestión de creaciones florales</p>

  <div class="topbar">
    <a href="index.html" target="_blank">👁 Ver tienda</a>
    <a href="login.html">🔒 Salir</a>
  </div>

</header>

<div class="container">

<!-- ESTADÍSTICAS -->
<div class="stats">

<div class="card">
<h3>🌸 Productos</h3>
<p id="total">0</p>
</div>

<div class="card">
<h3>🌺 Colecciones</h3>
<p>4</p>
</div>

<div class="card">
<h3>💎 Destacados</h3>
<p>0</p>
</div>

</div>

<hr>

<!-- FORM -->
<h3>➕ Nueva creación floral</h3>

<form id="formulario" class="form">

<input type="text" id="nombre" placeholder="Nombre del arreglo">

<input type="text" id="precio" placeholder="Precio">

<!-- BOTÓN ARCHIVO BONITO -->
<div class="file-box">
    <button type="button" id="btnFile">📷 Seleccionar imagen</button>
    <span id="fileName">Ningún archivo</span>
</div>

<input type="file" id="imagen" hidden accept="image/*">

<div class="preview-box">
    <img
    id="preview"
    src=""
    alt="Vista previa"
    style="display:none;width:220px;height:220px;object-fit:cover;border-radius:15px;"
>
</div>



<button type="submit">💾 Guardar creación</button>

<p id="mensaje"></p>

</form>

<hr>

<div id="carrusel" class="carrusel"></div>

<!-- LISTA -->
<h3>📦 Catálogo floral</h3>
<div id="lista"></div>

</div>



<!-- ==========================
     MODAL EDITAR PRODUCTO
========================== -->

<div id="modalEditar" class="modal">

    <div class="modal-contenido">

        <h2>✏️ Editar producto</h2>

        <input
            type="text"
            id="editarNombre"
            placeholder="Nombre del arreglo"
        >

        <input
            type="number"
            id="editarPrecio"
            placeholder="Precio"
        >

        <div class="modal-botones">

            <button id="guardarCambios">
                💾 Guardar cambios
            </button>

            <button id="cerrarModal" class="cancelar">
                Cancelar
            </button>

        </div>

    </div>

</div>

<script type="module" src="js/panel-administracion.js?v=2"></script>
</body>
</html>

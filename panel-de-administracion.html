<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin | Mi Florería Eterna Eli</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
    margin:0;
    font-family:Poppins,sans-serif;
    background:#f5f0ea;
}

/* SIDEBAR */
.sidebar{
    width:220px;
    height:100vh;
    background:#8B4513;
    position:fixed;
    top:0;
    left:0;
    color:white;
    padding:20px;
}

.sidebar h2{
    font-size:18px;
    margin-bottom:30px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    margin:15px 0;
    padding:10px;
    border-radius:8px;
}

.sidebar a:hover{
    background:rgba(255,255,255,0.2);
}

/* CONTENIDO */
.content{
    margin-left:240px;
    padding:20px;
}

/* CARDS */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

button{
    background:#d63384;
    color:white;
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    opacity:.8;
}

</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<h2>🌸 Admin Eli</h2>

<a href="index.html" target="_blank">👁️ Ver tienda</a>
<a href="#agregar">➕ Agregar producto</a>
<a href="login.html" id="logout">🚪 Cerrar sesión</a>

</div>

<!-- CONTENIDO -->
<div class="content">

<h1>📊 Dashboard</h1>

<div class="cards">

<div class="card">
<h3>Total productos</h3>
<p id="total">0</p>
</div>

<div class="card">
<h3>Categorías</h3>
<p>4</p>
</div>

<div class="card">
<h3>Destacados</h3>
<p>0</p>
</div>

</div>

<hr>

<h2 id="agregar">➕ Agregar producto</h2>

<form id="formulario">

<input type="text" id="nombre" placeholder="Nombre" required><br><br>

<input type="text" id="precio" placeholder="Precio"><br><br>

<input type="text" id="imagen" placeholder="Imagen"><br><br>

<button type="submit">Guardar</button>

</form>

<hr>

<h2>📦 Lista de productos</h2>
<div id="lista"></div>

</div>

<script type="module">
import { auth, db } from "./js/firebase-config.js";
import {
    signOut
} from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";

import {
    collection,
    addDoc,
    getDocs,
    deleteDoc,
    doc
} from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

/* LOGOUT */
document.getElementById("logout").addEventListener("click", async () => {
    await signOut(auth);
});

/* GUARDAR PRODUCTO */
const form = document.getElementById("formulario");
const lista = document.getElementById("lista");
const total = document.getElementById("total");

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    await addDoc(collection(db, "productos"), {
        nombre: nombre.value,
        precio: precio.value,
        imagen: imagen.value
    });

    form.reset();
    cargar();
});

/* CARGAR PRODUCTOS */
async function cargar(){

    const querySnapshot = await getDocs(collection(db, "productos"));

    lista.innerHTML = "";

    total.innerText = querySnapshot.size;

    querySnapshot.forEach((d) => {

        lista.innerHTML += `
        <div class="card">
            <h3>${d.data().nombre}</h3>
            <p>${d.data().precio}</p>
            <button onclick="eliminar('${d.id}')">Eliminar</button>
        </div>
        `;

    });

}

/* ELIMINAR */
window.eliminar = async (id) => {
    await deleteDoc(doc(db, "productos", id));
    cargar();
}

cargar();

</script>

</body>
</html>

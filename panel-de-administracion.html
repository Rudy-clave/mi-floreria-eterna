<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Flores ETernas Eli | Admin</title>

<link rel="stylesheet" href="css/panel-administracion.css">
<link rel="stylesheet" href="css/style.css?v=2.0">
<script type="module" src="js/login.js?v=2.0"></script>


<style>

body{
    margin:0;
    font-family:Poppins,sans-serif;
    background:#f7f0e8;
}

/* HEADER ELEGANTE */
header{
    background:#8B4513;
    color:white;
    padding:25px;
    text-align:center;
}

/* CONTENEDOR */
.container{
    padding:20px;
    max-width:1000px;
    margin:auto;
}

/* ESTADÍSTICAS */
.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    margin-top:20px;
}

.card{
    background:white;
    border-radius:15px;
    padding:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
    border-top:4px solid #d63384;
}

/* FORMULARIO */
input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:10px;
    border:1px solid #ddd;
}

/* BOTONES */
button{
    background:#d63384;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    opacity:.85;
}

/* LISTA PRODUCTOS */
.producto{
    background:white;
    padding:15px;
    margin-top:10px;
    border-radius:12px;
    box-shadow:0 3px 10px rgba(0,0,0,.06);
}

.topbar{
    display:flex;
    justify-content:space-between;
    margin-top:15px;
}

a{
    text-decoration:none;
    color:#8B4513;
}

</style>

</head>

<body>

<header>

 <div class="header-content">

    <div class="brand">
      <div class="logo-box">
        <img src="images/Logo.jpeg" alt="Logo" class="logo">
      </div>
      <span class="brand-text">Mi Florería Eterna</span>
    </div>

    <a href="index.html" class="volver">🏠 Inicio</a>

  </div>

  <p class="subtitulo">Gestión de creaciones florales</p>

  <div class="topbar">
    <a href="index.html" target="_blank">👁 Ver tienda</a>
    <a href="login.html">🔒 Salir</a>
  </div>

</header>

<div class="container">

<!-- ESTADÍSTICAS -->
<div class="stats">

<div class="card">
<h3>🌸 Productos</h3>
<p id="total">0</p>
</div>

<div class="card">
<h3>🌺 Colecciones</h3>
<p>4</p>
</div>

<div class="card">
<h3>💎 Destacados</h3>
<p>0</p>
</div>

</div>

<hr>

<!-- FORM -->
<<h3>➕ Nueva creación floral</h3>

<form id="formulario" class="form">

<input type="text" id="nombre" placeholder="Nombre del arreglo">

<input type="text" id="precio" placeholder="Precio">

<!-- BOTÓN ARCHIVO BONITO -->
<div class="file-box">
    <button type="button" id="btnFile">📷 Seleccionar imagen</button>
    <span id="fileName">Ningún archivo</span>
</div>

<input type="file" id="imagen" hidden accept="image/*">

<button type="submit">💾 Guardar creación</button>

<p id="mensaje"></p>

</form>

<hr>

<div id="carrusel" class="carrusel"></div>

<!-- LISTA -->
<h3>📦 Catálogo floral</h3>
<div id="lista"></div>

</div>

<script type="module">

import { db } from "./js/firebase-config.js";
import {
    collection,
    addDoc,
    getDocs,
    deleteDoc,
    doc
} from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

/* GUARDAR */
document.getElementById("formulario").addEventListener("submit", async (e) => {
    e.preventDefault();

    await addDoc(collection(db,"productos"),{
        nombre:nombre.value,
        precio:precio.value,
        imagen:imagen.value
    });

    form.reset();
    cargar();
});

/* CARGAR */
const lista=document.getElementById("lista");
const total=document.getElementById("total");

async function cargar(){

    const data=await getDocs(collection(db,"productos"));

    lista.innerHTML="";
    total.innerText=data.size;

    data.forEach(d=>{

        lista.innerHTML+=`
        <div class="producto">
            <h3>🌸 ${d.data().nombre}</h3>
            <p>${d.data().precio}</p>
            <button onclick="eliminar('${d.id}')">Eliminar</button>
        </div>
        `;

    });

}

/* ELIMINAR */
window.eliminar=async(id)=>{
    await deleteDoc(doc(db,"productos",id));
    cargar();
}

cargar();

</script>

</body>
</html>
